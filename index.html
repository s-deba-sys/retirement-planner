<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retirement Planner</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>💰 Retirement Planner</h1>

<p>Indian Investment & Retirement Calculator</p>

</header>

<nav>

<button class="active">Dashboard</button>

<button>Retirement</button>

<button>SIP</button>

<button>NPS</button>

<button>SWP</button>

<button>Settings</button>

</nav>

<div class="container">

<div class="card">

<h2>Retirement Corpus Calculator</h2>

<label>Current Monthly Expense (₹)</label>
<input id="expense" type="number" value="30000">

<label>Inflation (%)</label>
<input id="inflation" type="number" value="6">

<label>Years Until Retirement</label>
<input id="years" type="number" value="34">

<label>Investment Return After Retirement (%)</label>
<input id="returnRate" type="number" value="8">

<label>Retirement Duration (Years)</label>
<input id="duration" type="number" value="45">

<button id="calculateBtn">
Calculate Retirement Corpus
</button>

<h2 id="result">₹0</h2>

</div>

<div class="card">

<canvas id="portfolioChart"></canvas>

</div>

</div>

<footer>

Version 0.1

</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="calculator.js"></script>
<script src="app.js"></script>

</body>

</html>
