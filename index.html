<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retirement Planner</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>💰 Retirement Planner</h1>

<p>Indian Investment & Retirement Calculator</p>

</header>

<nav>

<button class="active">Dashboard</button>

<button>Retirement</button>

<button>SIP</button>

<button>NPS</button>

<button>SWP</button>

<button>Settings</button>

</nav>

<div class="container">

<div class="card">

<h2>Retirement Summary</h2>

<p>Required Corpus</p>

<h1 id="requiredCorpus">₹0</h1>

</div>

<div class="card">

<h2>Projected Corpus</h2>

<h1 id="projectedCorpus">₹0</h1>

</div>

<div class="card">

<h2>Gap</h2>

<h1 id="gap">₹0</h1>

</div>

<div class="card">

<canvas id="portfolioChart"></canvas>

</div>

<div class="card">

<h2>Quick Calculators</h2>

<div class="grid">

<button id="retirementBtn">

Retirement

</button>

<button id="sipBtn">

SIP

</button>

<button id="npsBtn">

NPS

</button>

<button id="swpBtn">

SWP

</button>

</div>

</div>

</div>

<footer>

Version 0.1

</footer>

<script src="app.js"></script>

</body>

</html>
